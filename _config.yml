# The Site Configuration
theme: jekyll-theme-chirpy

baseurl: ''

lang: id-ID

timezone: Asia/Jakarta

title: Tasikisme
tagline: Info Terbaru Seputar Makalah, Skripsi dan Teknologi

description: >-
  Tips dan Trick Android terbaru,
  Download Makalah dan Skripsi

url: 'https://www.tasikisme.com'

github:
  username: satriadewa2x

social:
  name: Tasikisme
  links:
    - https://www.tasikisme.com

google_site_verification: google_meta_tag_verification

google_analytics:
  id: 'G-9F79GKB1P4'

theme_mode: # [light|dark]

img_cdn:

avatar: /assets/img/sample/avatar.jpg

toc: true

comments:
  provider: # disqus, utterances, giscus

paginate: 10

plugins:
  - jekyll-redirect-from
  - jekyll-archives

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ''
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ''
      type: tabs
    values:
      layout: page
      permalink: /:title/
      dynamic_title: true

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - '*.gem'
  - '*.gemspec'
  - tools
  - docs
  - README.md
  - LICENSE
  - node_modules
  - package*.json

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /category/:name/